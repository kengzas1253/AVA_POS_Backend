version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: ava_postgres
    restart: always

    environment:
      POSTGRES_DB: AVA_POS_DB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "avapos@2026"

    ports:
      - "5432:5432"

    volumes:
      - /c/Users/B460M/Desktop/AVA_API/docker/db:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5